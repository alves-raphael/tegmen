name: tests

env:
  ARTIFACT_NAME: app-${{ github.run_id }}.tar.gz

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

on:
  push:
    branches:
      - develop
      - main
      - master
      - workos
  pull_request:
    branches:
      - develop
      - main
      - master
      - workos

jobs:
  ci:
    runs-on: ubuntu-latest
    environment: Testing
    strategy:
      matrix:
        php-version: ['8.3']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-version }}
          tools: composer:v2

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Get Composer cache directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install Node Dependencies
        run: npm ci

      - name: Add Flux Credentials Loaded From ENV
        run: composer config http-basic.composer.fluxui.dev "${{ secrets.FLUX_USERNAME }}" "${{ secrets.FLUX_LICENSE_KEY }}"

      - name: Install Dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Copy Environment File
        run: cp .env.example .env

      - name: Generate Application Key
        run: php artisan key:generate

      - name: Build Assets
        run: npm run build

      - name: Run Tests
        run: ./vendor/bin/pest

      - name: Prepare Production Artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          set -euo pipefail

          composer install --no-dev --no-interaction --prefer-dist --optimize-autoloader
          STAGING_DIR="$(mktemp -d)"
          trap 'rm -rf "$STAGING_DIR"' EXIT
          rsync -a --delete \
            --exclude=node_modules \
            --exclude=.git \
            --exclude=.github \
            --exclude=.env \
            --exclude=storage \
            ./ "$STAGING_DIR/"

          tar -C "$STAGING_DIR" -czf "$ARTIFACT_NAME" .

      - name: Upload Production Artifact
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@v4
        with:
          name: deploy-artifact
          path: ${{ env.ARTIFACT_NAME }}
          retention-days: 1

  build-deploy:
    runs-on: ubuntu-latest
    needs: ci
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v4

      - name: Download Production Artifact
        uses: actions/download-artifact@v4
        with:
          name: deploy-artifact
          path: .

      - name: Upload to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          source: "${{ env.ARTIFACT_NAME }}"
          target: "/var/www/tegmen/releases"

      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USER }}
          key: ${{ secrets.SSH_KEY }}
          script: |
            set -e

            ARTIFACT_NAME="${{ env.ARTIFACT_NAME }}"

            RELEASE_DIR=/var/www/tegmen/releases/$(date +%s)

            mkdir -p "$RELEASE_DIR"
            tar -xzf "/var/www/tegmen/releases/$ARTIFACT_NAME" -C "$RELEASE_DIR"

            # Symlink shared files (.env, storage)
            rm -rf "$RELEASE_DIR/storage"
            ln -sfn /var/www/tegmen/shared/.env "$RELEASE_DIR/.env"
            ln -sfn /var/www/tegmen/shared/storage "$RELEASE_DIR/storage"

            # Switch current release
            ln -sfn "$RELEASE_DIR" /var/www/tegmen/current

            # Warm caches using production environment after .env is linked
            cd /var/www/tegmen/current
            php artisan optimize:clear
            php artisan config:cache
            php artisan route:cache
            php artisan view:cache

            # Restart services
            sudo systemctl reload php8.3-fpm
            sudo systemctl reload nginx
